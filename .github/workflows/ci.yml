name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-rust:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust
      - name: Check formatting
        run: cd backend-rust && cargo fmt -- --check
      - name: Clippy
        run: cd backend-rust && cargo clippy -- -D warnings
      - name: Run tests
        run: cd backend-rust && cargo test
      - name: Build release
        run: cd backend-rust && cargo build --release

  frontend-svelte:
    name: Frontend (Svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-svelte/package-lock.json
      - name: Install dependencies
        run: cd frontend-svelte && npm ci
      - name: Svelte check
        run: cd frontend-svelte && npm run check
      - name: Lint
        run: cd frontend-svelte && npm run lint
      - name: Build
        run: cd frontend-svelte && npm run build
